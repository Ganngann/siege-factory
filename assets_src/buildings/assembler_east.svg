<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </linearGradient>
  </defs>

  <g id="base">
    <!-- Main body — fills the tile -->
    <rect x="2" y="2" width="60" height="60" rx="3" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="2" y="2" width="60" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- Assembly platform (central circle) -->
    <circle cx="32" cy="32" r="20" fill="#4a4a4a" stroke="#3e3e3e" stroke-width="1"/>
    <circle cx="32" cy="32" r="18" fill="none" stroke="#555555" stroke-width="0.5"/>

    <!-- Rotating carousel ring -->
    <circle cx="32" cy="32" r="14" fill="none" stroke="#5c5c5c" stroke-width="1.5"/>
    <circle cx="32" cy="32" r="10" fill="#444444" stroke="#3e3e3e" stroke-width="0.5"/>

    <!-- Assembly arm cross pattern -->
    <line x1="22" y1="32" x2="42" y2="32" stroke="#6e6e6e" stroke-width="2"/>
    <line x1="32" y1="22" x2="32" y2="42" stroke="#6e6e6e" stroke-width="2"/>
    <circle cx="32" cy="32" r="3" fill="#777777"/>

    <!-- Robotic arm end effectors -->
    <circle cx="22" cy="32" r="2" fill="#7a7a7a"/>
    <circle cx="42" cy="32" r="2" fill="#7a7a7a"/>
    <circle cx="32" cy="22" r="2" fill="#7a7a7a"/>
    <circle cx="32" cy="42" r="2" fill="#7a7a7a"/>

    <!-- Corner bolts -->
    <circle cx="8" cy="8" r="1.5" fill="#6e6e6e"/>
    <circle cx="56" cy="8" r="1.5" fill="#6e6e6e"/>
    <circle cx="8" cy="56" r="1.5" fill="#6e6e6e"/>
    <circle cx="56" cy="56" r="1.5" fill="#6e6e6e"/>

    <!-- Yellow ports (left input, right output) -->
    <rect x="0" y="24" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="4" y1="24" x2="4" y2="40" stroke="#ffe066" stroke-width="0.5"/>
    <rect x="60" y="24" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="60" y1="24" x2="60" y2="40" stroke="#ffe066" stroke-width="0.5"/>
  </g>

  <g id="owner_color">
    <!-- Ring highlight -->
    <circle cx="32" cy="32" r="12" fill="none" stroke="white" stroke-width="2"/>
  </g>

  <g id="level_color">
    <!-- Level badge -->
    <rect x="6" y="48" width="10" height="6" rx="1" fill="white"/>
  </g>
</svg>
