<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5e5e5e"/>
      <stop offset="50%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#525252"/>
    </linearGradient>
  </defs>

  <g id="base">
    <!-- Main factory body — octagonal silhouette -->
    <path d="M 10 10 L 54 10 L 58 18 L 58 46 L 54 54 L 10 54 L 6 46 L 6 18 Z"
          fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1" stroke-linejoin="round"/>

    <!-- Top highlight -->
    <line x1="10" y1="10" x2="54" y2="10" stroke="#6a6a6a" stroke-width="0.5"/>
    <line x1="10" y1="10" x2="6" y2="18" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- Chimney / exhaust -->
    <rect x="36" y="0" width="10" height="12" rx="1" fill="#4a4a4a" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="36" y="0" width="10" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>
    <rect x="34" y="10" width="14" height="3" rx="1" fill="#555" stroke="#444" stroke-width="0.5"/>

    <!-- Chimney cap -->
    <path d="M 35 0 L 47 0 L 45 -3 L 37 -3 Z" fill="#585858" stroke="#444" stroke-width="0.5"/>

    <!-- Exhaust puff -->
    <circle cx="41" cy="-2" r="4" fill="#aaa" opacity="0.15"/>
    <circle cx="44" cy="-4" r="3" fill="#aaa" opacity="0.1"/>

    <!-- Assembly window / viewport -->
    <rect x="20" y="20" width="24" height="18" rx="2" fill="#3c3c3c" stroke="#4a4a4a" stroke-width="1"/>

    <!-- Internal assembly arm (visible through window) -->
    <line x1="22" y1="36" x2="32" y2="24" stroke="#6e6e6e" stroke-width="2"/>
    <line x1="32" y1="24" x2="42" y2="32" stroke="#6e6e6e" stroke-width="2"/>
    <circle cx="32" cy="24" r="2" fill="#7a7a7a"/>
    <circle cx="42" cy="32" r="2" fill="#888"/>

    <!-- Control panel -->
    <rect x="20" y="40" width="24" height="8" rx="1" fill="#484848" stroke="#4a4a4a" stroke-width="0.5"/>

    <!-- Status lights on panel -->
    <circle cx="24" cy="44" r="1.5" fill="#007700"/>
    <circle cx="30" cy="44" r="1.5" fill="#007700"/>
    <circle cx="36" cy="44" r="1.5" fill="#880000"/>

    <!-- Horizontal reinforcement band -->
    <line x1="8" y1="38" x2="56" y2="38" stroke="#545454" stroke-width="1"/>

    <!-- Input port (left edge) -->
    <rect x="2" y="24" width="4" height="16" rx="1" fill="#2e2e2e"/>
    <rect x="2" y="26" width="3" height="12" fill="#3a3a3a"/>
    <line x1="6" y1="24" x2="6" y2="40" stroke="#5a5a5a" stroke-width="0.5"/>

    <!-- Output port (right edge) -->
    <rect x="58" y="24" width="4" height="16" rx="1" fill="#2e2e2e"/>
    <rect x="59" y="26" width="3" height="12" fill="#3a3a3a"/>
    <line x1="58" y1="24" x2="58" y2="40" stroke="#5a5a5a" stroke-width="0.5"/>

    <!-- Input/output chute hints -->
    <rect x="6" y="26" width="4" height="12" fill="#4c4c4c" stroke="#444" stroke-width="0.5"/>
    <rect x="54" y="26" width="4" height="12" fill="#4c4c4c" stroke="#444" stroke-width="0.5"/>

    <!-- Anchoring feet -->
    <rect x="8" y="54" width="6" height="2" rx="0.5" fill="#555"/>
    <rect x="50" y="54" width="6" height="2" rx="0.5" fill="#555"/>
  </g>

  <g id="owner_color">
    <!-- Stripe on chimney -->
    <rect x="38" y="2" width="6" height="8" fill="white"/>
  </g>

  <g id="level_color">
    <!-- Level badge on body -->
    <rect x="46" y="12" width="6" height="6" rx="1" fill="white"/>
  </g>
</svg>
