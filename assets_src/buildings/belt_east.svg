<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="beltBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a6a6a"/>
      <stop offset="50%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
    <linearGradient id="roller" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#999"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
  </defs>

  <!-- Belt background -->
  <rect x="0" y="8" width="64" height="48" rx="2" fill="url(#beltBg)" stroke="#444" stroke-width="1"/>

  <!-- Border highlights -->
  <rect x="0" y="8" width="64" height="3" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="0" y="53" width="64" height="3" fill="none" stroke="#555" stroke-width="1"/>

  <!-- Roller lines -->
  <line x1="6" y1="10" x2="6" y2="54" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="14" y1="10" x2="14" y2="54" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="22" y1="10" x2="22" y2="54" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="30" y1="10" x2="30" y2="54" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="38" y1="10" x2="38" y2="54" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="46" y1="10" x2="46" y2="54" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="54" y1="10" x2="54" y2="54" stroke="url(#roller)" stroke-width="1.5"/>

  <!-- Belt surface highlight -->
  <rect x="0" y="28" width="64" height="8" fill="rgba(255,255,255,0.04)"/>

  <!-- Direction arrow -->
  <polygon points="50,32 42,26 42,30 22,30 22,34 42,34 42,38" fill="#aaa" opacity="0.6"/>

  <!-- Center guide line -->
  <line x1="2" y1="32" x2="22" y2="32" stroke="#666" stroke-width="2" opacity="0.3"/>
  <line x1="42" y1="32" x2="60" y2="32" stroke="#666" stroke-width="2" opacity="0.3"/>

  <!-- Small dots on belt (belt pattern) -->
  <circle cx="10" cy="20" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="18" cy="20" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="34" cy="20" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="42" cy="20" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="50" cy="20" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="6" cy="44" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="22" cy="44" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="30" cy="44" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="46" cy="44" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="54" cy="44" r="1.5" fill="#777" opacity="0.5"/>

  <!-- Edge connector hints (left/right) -->
  <rect x="0" y="20" width="2" height="24" fill="#444" rx="1"/>
  <rect x="62" y="20" width="2" height="24" fill="#444" rx="1"/>
</svg>
