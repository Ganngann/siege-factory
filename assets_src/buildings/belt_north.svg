<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="beltBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6a6a6a"/>
      <stop offset="50%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
    <linearGradient id="roller" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#888"/>
      <stop offset="50%" stop-color="#999"/>
      <stop offset="100%" stop-color="#777"/>
    </linearGradient>
  </defs>

  <!-- Belt background -->
  <rect x="8" y="0" width="48" height="64" rx="2" fill="url(#beltBg)" stroke="#444" stroke-width="1"/>

  <!-- Border highlights -->
  <rect x="8" y="0" width="3" height="64" fill="none" stroke="#555" stroke-width="1"/>
  <rect x="53" y="0" width="3" height="64" fill="none" stroke="#555" stroke-width="1"/>

  <!-- Roller lines (horizontal) -->
  <line x1="10" y1="6" x2="54" y2="6" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="10" y1="14" x2="54" y2="14" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="10" y1="22" x2="54" y2="22" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="10" y1="30" x2="54" y2="30" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="10" y1="38" x2="54" y2="38" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="10" y1="46" x2="54" y2="46" stroke="url(#roller)" stroke-width="1.5"/>
  <line x1="10" y1="54" x2="54" y2="54" stroke="url(#roller)" stroke-width="1.5"/>

  <!-- Belt surface highlight -->
  <rect x="28" y="0" width="8" height="64" fill="rgba(255,255,255,0.04)"/>

  <!-- Direction arrow (up) -->
  <polygon points="32,14 26,22 30,22 30,42 34,42 34,22 38,22" fill="#aaa" opacity="0.6"/>

  <!-- Center guide line -->
  <line x1="32" y1="2" x2="32" y2="14" stroke="#666" stroke-width="2" opacity="0.3"/>
  <line x1="32" y1="42" x2="32" y2="60" stroke="#666" stroke-width="2" opacity="0.3"/>

  <!-- Small dots -->
  <circle cx="44" cy="10" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="44" cy="18" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="44" cy="34" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="44" cy="50" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="20" cy="6" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="20" cy="22" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="20" cy="38" r="1.5" fill="#777" opacity="0.5"/>
  <circle cx="20" cy="54" r="1.5" fill="#777" opacity="0.5"/>

  <!-- Edge connectors -->
  <rect x="24" y="0" width="16" height="2" fill="#444" rx="1"/>
  <rect x="24" y="62" width="16" height="2" fill="#444" rx="1"/>
</svg>
