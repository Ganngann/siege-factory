<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bodyGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#6a6a6a"/>
      <stop offset="50%" stop-color="#4e4e4e"/>
      <stop offset="100%" stop-color="#5a5a5a"/>
    </linearGradient>
    <linearGradient id="mastGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#525252"/>
      <stop offset="50%" stop-color="#626262"/>
      <stop offset="100%" stop-color="#4e4e4e"/>
    </linearGradient>
  </defs>

  <g id="base">
    <!-- Foundation plate -->
    <rect x="4" y="48" width="56" height="12" rx="2" fill="#484848" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="4" y="48" width="56" height="2" fill="none" stroke="#5a5a5a" stroke-width="0.5"/>

    <!-- Drill rig body -->
    <rect x="18" y="8" width="28" height="40" rx="2" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Rig side rails -->
    <line x1="20" y1="10" x2="20" y2="46" stroke="#585858" stroke-width="1.5"/>
    <line x1="44" y1="10" x2="44" y2="46" stroke="#585858" stroke-width="1.5"/>

    <!-- Cross-bracing diagonal pattern -->
    <line x1="22" y1="16" x2="42" y2="26" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="22" y1="26" x2="42" y2="16" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="22" y1="30" x2="42" y2="40" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="22" y1="40" x2="42" y2="30" stroke="#5c5c5c" stroke-width="1"/>

    <!-- Central drill shaft -->
    <line x1="32" y1="10" x2="32" y2="46" stroke="#6e6e6e" stroke-width="2"/>
    <circle cx="32" cy="10" r="2" fill="#6e6e6e"/>
    <circle cx="32" cy="22" r="1.5" fill="#707070"/>
    <circle cx="32" cy="34" r="1.5" fill="#707070"/>
    <circle cx="32" cy="46" r="2" fill="#6e6e6e"/>

    <!-- Drill bit housing -->
    <rect x="24" y="4" width="16" height="6" rx="2" fill="#555555" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="24" y="4" width="16" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- Drill bit (pointed cone upward) -->
    <polygon points="28,4 36,4 32,0" fill="#777777" stroke="#555555" stroke-width="0.5"/>

    <!-- Motor/gearbox on foundation -->
    <rect x="8" y="42" width="30" height="8" rx="2" fill="url(#mastGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="8" y="42" width="30" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- Bolts on motor -->
    <circle cx="12" cy="46" r="1.5" fill="#7a7a7a"/>
    <circle cx="20" cy="46" r="1.5" fill="#7a7a7a"/>
    <circle cx="28" cy="46" r="1.5" fill="#7a7a7a"/>

    <!-- Output port (right edge, aligns with belt connector) -->
    <rect x="60" y="20" width="4" height="24" rx="1" fill="#2e2e2e"/>
    <rect x="61" y="22" width="3" height="20" fill="#3a3a3a"/>
    <line x1="60" y1="20" x2="60" y2="44" stroke="#5a5a5a" stroke-width="0.5"/>
    <line x1="60" y1="20" x2="62" y2="20" stroke="#666666" stroke-width="0.5"/>
  </g>

  <g id="owner_color">
    <!-- Vertical stripe on rig body -->
    <rect x="30" y="14" width="4" height="32" fill="white"/>
  </g>

  <g id="level_color">
    <!-- Level badge on motor -->
    <rect x="32" y="43" width="4" height="6" rx="1" fill="white"/>
  </g>
</svg>
