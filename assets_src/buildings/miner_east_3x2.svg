    <rect x="90" y="0" width="12" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>
    <polygon points="93,0 99,0 96,-4" fill="#777" stroke="#555" stroke-width="0.5"/>

    <!-- Right column -->
    <rect x="136" y="4" width="40" height="54" rx="2" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <line x1="138" y1="6" x2="138" y2="56" stroke="#585858" stroke-width="1.5"/>
    <line x1="174" y1="6" x2="174" y2="56" stroke="#585858" stroke-width="1.5"/>
    <line x1="142" y1="14" x2="170" y2="22" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="142" y1="22" x2="170" y2="14" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="142" y1="30" x2="170" y2="38" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="142" y1="38" x2="170" y2="30" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="142" y1="46" x2="170" y2="54" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="142" y1="54" x2="170" y2="46" stroke="#5c5c5c" stroke-width="1"/>
