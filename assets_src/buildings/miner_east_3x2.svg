<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 128" width="192" height="128">
  <defs>
    <linearGradient id="bodyGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#6a6a6a"/>
      <stop offset="50%" stop-color="#4e4e4e"/>
      <stop offset="100%" stop-color="#5a5a5a"/>
    </linearGradient>
    <linearGradient id="mastGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#525252"/>
      <stop offset="50%" stop-color="#626262"/>
      <stop offset="100%" stop-color="#4e4e4e"/>
    </linearGradient>
  </defs>

  <g id="base">
    <!-- === TOP ROW (y=4..60) — 3 drill columns === -->

    <!-- Left column -->
    <rect x="16" y="4" width="40" height="54" rx="2" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <line x1="18" y1="6" x2="18" y2="56" stroke="#585858" stroke-width="1.5"/>
    <line x1="54" y1="6" x2="54" y2="56" stroke="#585858" stroke-width="1.5"/>
    <line x1="22" y1="14" x2="50" y2="22" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="22" y1="22" x2="50" y2="14" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="22" y1="30" x2="50" y2="38" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="22" y1="38" x2="50" y2="30" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="22" y1="46" x2="50" y2="54" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="22" y1="54" x2="50" y2="46" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="36" y1="6" x2="36" y2="56" stroke="#6e6e6e" stroke-width="2"/>
    <circle cx="36" cy="10" r="2" fill="#6e6e6e"/>
    <circle cx="36" cy="30" r="1.5" fill="#707070"/>
    <circle cx="36" cy="50" r="2" fill="#6e6e6e"/>
    <rect x="30" y="0" width="12" height="6" rx="2" fill="#555" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="30" y="0" width="12" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>
    <polygon points="33,0 39,0 36,-4" fill="#777" stroke="#555" stroke-width="0.5"/>

    <!-- Center column -->
    <rect x="76" y="4" width="40" height="54" rx="2" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <line x1="78" y1="6" x2="78" y2="56" stroke="#585858" stroke-width="1.5"/>
    <line x1="114" y1="6" x2="114" y2="56" stroke="#585858" stroke-width="1.5"/>
    <line x1="82" y1="14" x2="110" y2="22" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="82" y1="22" x2="110" y2="14" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="82" y1="30" x2="110" y2="38" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="82" y1="38" x2="110" y2="30" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="82" y1="46" x2="110" y2="54" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="82" y1="54" x2="110" y2="46" stroke="#5c5c5c" stroke-width="1"/>
    <line x1="96" y1="6" x2="96" y2="56" stroke="#6e6e6e" stroke-width="2"/>
    <circle cx="96" cy="10" r="2" fill="#6e6e6e"/>
    <circle cx="96" cy="30" r="1.5" fill="#707070"/>
    <circle cx="96" cy="50" r="2" fill="#6e6e6e"/>
