    <circle cx="156" cy="10" r="2" fill="#6e6e6e"/>
    <circle cx="156" cy="30" r="1.5" fill="#707070"/>
    <circle cx="156" cy="50" r="2" fill="#6e6e6e"/>
    <rect x="150" y="0" width="12" height="6" rx="2" fill="#555" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="150" y="0" width="12" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>
    <polygon points="153,0 159,0 156,-4" fill="#777" stroke="#555" stroke-width="0.5"/>

    <!-- === TOP CONVEYOR (y=56..66) — collects all 3 columns === -->

    <rect x="4" y="56" width="184" height="10" rx="1" fill="#4a4a4a" stroke="#3e3e3e" stroke-width="1"/>
    <line x1="4" y1="56" x2="188" y2="56" stroke="#5a5a5a" stroke-width="0.5"/>
    <line x1="8" y1="61" x2="184" y2="61" stroke="#585858" stroke-width="0.5"/>
    <rect x="6" y="58" width="4" height="6" fill="#5e5e5e"/>
    <rect x="182" y="58" width="4" height="6" fill="#5e5e5e"/>
    <rect x="60" y="58" width="4" height="6" fill="#5e5e5e"/>
    <rect x="120" y="58" width="4" height="6" fill="#5e5e5e"/>

    <!-- Top output port (right edge, top-right tile) -->
    <rect x="188" y="20" width="4" height="24" rx="1" fill="#2e2e2e"/>
    <rect x="189" y="22" width="3" height="20" fill="#3a3a3a"/>
    <line x1="188" y1="20" x2="188" y2="44" stroke="#5a5a5a" stroke-width="0.5"/>
    <line x1="188" y1="20" x2="190" y2="20" stroke="#666666" stroke-width="0.5"/>
    <!-- Chute from conveyor to top port -->
    <rect x="178" y="56" width="10" height="8" fill="#4c4c4c" stroke="#444" stroke-width="0.5"/>

    <!-- === BOTTOM ROW (y=66..122) — processing body === -->

    <rect x="4" y="66" width="178" height="56" rx="3" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="4" y="66" width="178" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- Panel divisions -->
    <line x1="6" y1="80" x2="180" y2="80" stroke="#545454" stroke-width="1"/>
    <line x1="6" y1="104" x2="180" y2="104" stroke="#545454" stroke-width="1"/>

    <!-- Left inspection window -->
    <rect x="10" y="84" width="28" height="16" rx="1" fill="#3c3c3c" stroke="#4a4a4a" stroke-width="1"/>
    <line x1="24" y1="84" x2="24" y2="100" stroke="#4a4a4a" stroke-width="0.5"/>
    <line x1="10" y1="92" x2="38" y2="92" stroke="#4a4a4a" stroke-width="0.5"/>

    <!-- Center display panel -->
    <rect x="60" y="84" width="50" height="16" rx="1" fill="#484848" stroke="#4a4a4a" stroke-width="1"/>
    <circle cx="72" cy="92" r="2.5" fill="#666666"/>
    <circle cx="85" cy="92" r="2.5" fill="#666666"/>
    <circle cx="98" cy="92" r="2.5" fill="#666666"/>

    <!-- Right inspection window -->
    <rect x="138" y="84" width="28" height="16" rx="1" fill="#3c3c3c" stroke="#4a4a4a" stroke-width="1"/>
    <line x1="152" y1="84" x2="152" y2="100" stroke="#4a4a4a" stroke-width="0.5"/>
    <line x1="138" y1="92" x2="166" y2="92" stroke="#4a4a4a" stroke-width="0.5"/>

    <!-- Motor unit -->
    <rect x="40" y="108" width="80" height="14" rx="2" fill="url(#mastGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="40" y="108" width="80" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>
    <rect x="42" y="112" width="6" height="8" rx="0.5" fill="#585858"/>
    <rect x="50" y="112" width="6" height="8" rx="0.5" fill="#585858"/>
    <rect x="58" y="112" width="6" height="8" rx="0.5" fill="#585858"/>
    <rect x="66" y="112" width="6" height="8" rx="0.5" fill="#585858"/>
    <rect x="74" y="112" width="6" height="8" rx="0.5" fill="#585858"/>
    <rect x="82" y="112" width="6" height="8" rx="0.5" fill="#585858"/>
    <rect x="90" y="112" width="6" height="8" rx="0.5" fill="#585858"/>
    <rect x="98" y="112" width="6" height="8" rx="0.5" fill="#585858"/>
    <circle cx="110" cy="115" r="2" fill="#007700" stroke="#005500" stroke-width="0.5"/>

    <!-- Bottom output port (right edge, bottom-right tile) -->
    <rect x="188" y="84" width="4" height="24" rx="1" fill="#2e2e2e"/>
    <rect x="189" y="86" width="3" height="20" fill="#3a3a3a"/>
    <line x1="188" y1="84" x2="188" y2="108" stroke="#5a5a5a" stroke-width="0.5"/>
    <line x1="188" y1="84" x2="190" y2="84" stroke="#666666" stroke-width="0.5"/>
    <!-- Output chute -->
    <rect x="178" y="86" width="10" height="20" fill="#4c4c4c" stroke="#444" stroke-width="0.5"/>

    <!-- Foundation plate -->
    <rect x="4" y="122" width="184" height="6" rx="1" fill="#484848" stroke="#3e3e3e" stroke-width="1"/>
    <line x1="4" y1="122" x2="188" y2="122" stroke="#5a5a5a" stroke-width="0.5"/>
    <rect x="10" y="126" width="6" height="2" rx="0.5" fill="#555"/>
    <rect x="40" y="126" width="6" height="2" rx="0.5" fill="#555"/>
    <rect x="70" y="126" width="6" height="2" rx="0.5" fill="#555"/>
    <rect x="100" y="126" width="6" height="2" rx="0.5" fill="#555"/>
    <rect x="130" y="126" width="6" height="2" rx="0.5" fill="#555"/>
    <rect x="160" y="126" width="6" height="2" rx="0.5" fill="#555"/>
  </g>

  <g id="owner_color">
    <rect x="20" y="8" width="4" height="46" fill="white"/>
    <rect x="80" y="8" width="4" height="46" fill="white"/>
    <rect x="140" y="8" width="4" height="46" fill="white"/>
    <rect x="6" y="68" width="174" height="4" fill="white"/>
  </g>

  <g id="level_color">
    <rect x="88" y="57" width="8" height="8" rx="1" fill="white"/>
    <rect x="130" y="111" width="10" height="8" rx="1" fill="white"/>
  </g>
</svg>
