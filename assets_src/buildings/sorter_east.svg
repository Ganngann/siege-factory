<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </linearGradient>
  </defs>

  <g id="base">
    <!-- Main body — fills the tile -->
    <rect x="2" y="2" width="60" height="60" rx="3" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="2" y="2" width="60" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- T-shaped belt surface -->
    <!-- Horizontal lane -->
    <rect x="2" y="22" width="60" height="20" rx="1" fill="#505050" stroke="#444444" stroke-width="0.5"/>
    <!-- Vertical lane (branch to top) -->
    <rect x="22" y="2" width="20" height="20" rx="1" fill="#505050" stroke="#444444" stroke-width="0.5"/>

    <!-- Lane guide lines -->
    <line x1="2" y1="26" x2="62" y2="26" stroke="#5a5a5a" stroke-width="0.5"/>
    <line x1="2" y1="38" x2="62" y2="38" stroke="#5a5a5a" stroke-width="0.5"/>
    <line x1="26" y1="2" x2="26" y2="22" stroke="#5a5a5a" stroke-width="0.5"/>
    <line x1="38" y1="2" x2="38" y2="22" stroke="#5a5a5a" stroke-width="0.5"/>

    <!-- Central hub -->
    <circle cx="32" cy="32" r="8" fill="#4a4a4a" stroke="#3e3e3e" stroke-width="0.5"/>

    <!-- Scanner/filter bar (distinctive sorter feature) -->
    <rect x="22" y="22" width="20" height="20" rx="1" fill="#3e3e3e" stroke="#333333" stroke-width="0.5"/>
    <!-- Scanner beam -->
    <rect x="22" y="28" width="20" height="4" fill="#00aaff" opacity="0.3"/>
    <!-- Scanner sensor dots -->
    <circle cx="28" cy="24" r="1.5" fill="#00aaff" opacity="0.6"/>
    <circle cx="32" cy="24" r="1.5" fill="#00aaff" opacity="0.6"/>
    <circle cx="36" cy="24" r="1.5" fill="#00aaff" opacity="0.6"/>

    <!-- Direction arrows -->
    <polygon points="14,32 8,27 8,30 2,30 2,34 8,34 8,37" fill="#aaa" opacity="0.5"/>
    <polygon points="50,32 56,27 56,30 62,30 62,34 56,34 56,37" fill="#aaa" opacity="0.5"/>
    <polygon points="32,14 27,8 30,8 30,2 34,2 34,8 37,8" fill="#aaa" opacity="0.5"/>

    <!-- Corner bolts -->
    <circle cx="8" cy="8" r="1.5" fill="#6e6e6e"/>
    <circle cx="56" cy="8" r="1.5" fill="#6e6e6e"/>
    <circle cx="8" cy="56" r="1.5" fill="#6e6e6e"/>
    <circle cx="56" cy="56" r="1.5" fill="#6e6e6e"/>

    <!-- Yellow ports — 3-way (left, right, top) -->
    <rect x="0" y="24" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="4" y1="24" x2="4" y2="40" stroke="#ffe066" stroke-width="0.5"/>
    <rect x="60" y="24" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="60" y1="24" x2="60" y2="40" stroke="#ffe066" stroke-width="0.5"/>
    <rect x="24" y="0" width="16" height="4" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="24" y1="4" x2="40" y2="4" stroke="#ffe066" stroke-width="0.5"/>
  </g>

  <g id="owner_color">
    <!-- Stripe on scanner housing -->
    <rect x="24" y="24" width="16" height="3" fill="white"/>
  </g>

  <g id="level_color">
    <!-- Level badge -->
    <rect x="46" y="6" width="10" height="6" rx="1" fill="white"/>
  </g>
</svg>
