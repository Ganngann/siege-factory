<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </linearGradient>
  </defs>

  <g id="base">
    <!-- Main body — fills the tile -->
    <rect x="2" y="2" width="60" height="60" rx="3" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="2" y="2" width="60" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- Inner storage chamber -->
    <rect x="8" y="8" width="48" height="48" rx="2" fill="#3e3e3e" stroke="#333333" stroke-width="1"/>

    <!-- Grid pattern — 4×4 storage cells -->
    <!-- Row 1 -->
    <rect x="10" y="10" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="22" y="10" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="34" y="10" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="46" y="10" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <!-- Row 2 -->
    <rect x="10" y="22" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="22" y="22" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="34" y="22" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="46" y="22" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <!-- Row 3 -->
    <rect x="10" y="34" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="22" y="34" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="34" y="34" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="46" y="34" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <!-- Row 4 -->
    <rect x="10" y="46" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="22" y="46" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="34" y="46" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>
    <rect x="46" y="46" width="10" height="10" rx="1" fill="#4a4a4a" stroke="#3a3a3a" stroke-width="0.5"/>

    <!-- Corner bolts -->
    <circle cx="6" cy="6" r="1.5" fill="#6e6e6e"/>
    <circle cx="58" cy="6" r="1.5" fill="#6e6e6e"/>
    <circle cx="6" cy="58" r="1.5" fill="#6e6e6e"/>
    <circle cx="58" cy="58" r="1.5" fill="#6e6e6e"/>

    <!-- Yellow ports — 4 sides -->
    <rect x="0" y="24" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="4" y1="24" x2="4" y2="40" stroke="#ffe066" stroke-width="0.5"/>
    <rect x="60" y="24" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="60" y1="24" x2="60" y2="40" stroke="#ffe066" stroke-width="0.5"/>
    <rect x="24" y="0" width="16" height="4" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="24" y1="4" x2="40" y2="4" stroke="#ffe066" stroke-width="0.5"/>
    <rect x="24" y="60" width="16" height="4" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="24" y1="60" x2="40" y2="60" stroke="#ffe066" stroke-width="0.5"/>
  </g>

  <g id="owner_color">
    <!-- Stripe across top row of cells -->
    <rect x="10" y="10" width="46" height="3" fill="white"/>
  </g>

  <g id="level_color">
    <!-- Level badge -->
    <rect x="6" y="48" width="10" height="6" rx="1" fill="white"/>
  </g>
</svg>
