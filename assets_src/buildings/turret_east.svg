<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5e5e5e"/>
      <stop offset="50%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#525252"/>
    </linearGradient>
    <linearGradient id="barrelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="50%" stop-color="#666"/>
      <stop offset="100%" stop-color="#4e4e4e"/>
    </linearGradient>
  </defs>

  <g id="base">
    <!-- Fixed base platform — hexagonal -->
    <polygon points="32,54 14,46 14,34 32,26 50,34 50,46"
             fill="url(#baseGrad)" stroke="#3e3e3e" stroke-width="1" stroke-linejoin="round"/>
    <line x1="14" y1="34" x2="50" y2="34" stroke="#5a5a5a" stroke-width="0.5"/>

    <!-- Base edge highlights -->
    <line x1="32" y1="26" x2="50" y2="34" stroke="#6a6a6a" stroke-width="0.5"/>
    <line x1="32" y1="26" x2="14" y2="34" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- Turret ring (rotating part) -->
    <ellipse cx="32" cy="40" rx="12" ry="4" fill="#525252" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Rotating turret body -->
    <rect x="24" y="28" width="16" height="14" rx="2" fill="url(#baseGrad)" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Turret body top highlight -->
    <rect x="24" y="28" width="16" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- Vision sensor / targeting camera (top of turret) -->
    <rect x="28" y="22" width="8" height="6" rx="1" fill="#4a4a4a" stroke="#3e3e3e" stroke-width="1"/>
    <circle cx="32" cy="25" r="3" fill="#3c3c3c" stroke="#555" stroke-width="0.5"/>
    <circle cx="32" cy="25" r="1.5" fill="#880000"/>

    <!-- Barrel — pointing east (right) -->
    <rect x="38" y="32" width="24" height="6" rx="1" fill="url(#barrelGrad)" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Barrel tip / muzzle -->
    <rect x="60" y="30" width="4" height="10" rx="1" fill="#555" stroke="#3e3e3e" stroke-width="1"/>
    <circle cx="62" cy="35" r="3" fill="#3c3c3c"/>

    <!-- Barrel support bracket -->
    <polygon points="38,38 42,38 42,42 38,42" fill="#585858" stroke="#444" stroke-width="0.5"/>

    <!-- Ammo feed (left side) -->
    <rect x="14" y="36" width="12" height="8" rx="1" fill="#4a4a4a" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="14" y="36" width="12" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>
    <circle cx="18" cy="40" r="1.5" fill="#7a7a7a"/>
    <circle cx="22" cy="40" r="1.5" fill="#7a7a7a"/>

    <!-- Base bolts -->
    <circle cx="20" cy="40" r="1.5" fill="#7a7a7a"/>
    <circle cx="44" cy="40" r="1.5" fill="#7a7a7a"/>
    <circle cx="32" cy="48" r="1.5" fill="#7a7a7a"/>

    <!-- Anchoring feet -->
    <rect x="16" y="52" width="4" height="2" rx="0.5" fill="#555"/>
    <rect x="44" y="52" width="4" height="2" rx="0.5" fill="#555"/>
  </g>

  <g id="owner_color">
    <!-- Stripe on turret body -->
    <rect x="26" y="30" width="12" height="4" fill="white"/>
  </g>

  <g id="level_color">
    <!-- Level indicator on base -->
    <rect x="38" y="44" width="6" height="4" rx="1" fill="white"/>
  </g>
</svg>
