<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5e5e5e"/>
      <stop offset="50%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#525252"/>
    </linearGradient>
  </defs>

  <g id="base">
    <!-- === BODY === -->
    <!-- Spherical/rounded main body -->
    <ellipse cx="34" cy="30" rx="16" ry="18" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Body highlight -->
    <ellipse cx="30" cy="24" rx="6" ry="8" fill="none" stroke="#6a6a6a" stroke-width="0.5" opacity="0.4"/>

    <!-- Chest panel -->
    <rect x="26" y="24" width="16" height="10" rx="2" fill="#4c4c4c" stroke="#444" stroke-width="0.5"/>

    <!-- Status lights on chest -->
    <circle cx="30" cy="29" r="1.5" fill="#00aa00"/>
    <circle cx="34" cy="29" r="1.5" fill="#00aa00"/>
    <circle cx="38" cy="29" r="1.5" fill="#ffaa00"/>

    <!-- === HEAD === -->
    <!-- Head dome -->
    <ellipse cx="34" cy="10" rx="10" ry="8" fill="#525252" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Face / visor -->
    <rect x="28" y="8" width="12" height="4" rx="2" fill="#3c3c3c" stroke="#555" stroke-width="0.5"/>
    <rect x="30" y="9" width="8" height="2" fill="#88ccff" opacity="0.3"/>

    <!-- Antenna on head -->
    <line x1="34" y1="2" x2="34" y2="-4" stroke="#666" stroke-width="1.5"/>
    <circle cx="34" cy="-5" r="2" fill="#ff4444" stroke="#cc0000" stroke-width="0.5"/>

    <!-- === ARMS === -->
    <!-- Left arm (tool arm) — thicker, mechanical -->
    <rect x="8" y="22" width="10" height="6" rx="2" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="6" y="28" width="8" height="5" rx="1.5" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Wrench tool in left hand -->
    <rect x="2" y="26" width="6" height="3" rx="0.5" fill="#777" stroke="#555" stroke-width="0.5"/>
    <rect x="0" y="24" width="4" height="7" rx="1" fill="#777" stroke="#555" stroke-width="0.5"/>
    <rect x="0" y="24" width="2" height="2" fill="#999"/>
    <rect x="2" y="28" width="2" height="2" fill="#999"/>

    <!-- Right arm -->
    <rect x="50" y="26" width="10" height="6" rx="2" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Right hand (claw) -->
    <rect x="58" y="24" width="4" height="10" rx="1" fill="#5a5a5a" stroke="#444" stroke-width="0.5"/>
    <line x1="60" y1="24" x2="60" y2="34" stroke="#555" stroke-width="0.5"/>

    <!-- === LEGS === -->
    <!-- Tracks / treads instead of legs (construction vehicle style) -->
    <rect x="18" y="44" width="14" height="10" rx="3" fill="#4a4a4a" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="36" y="44" width="14" height="10" rx="3" fill="#4a4a4a" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Track tread details -->
    <line x1="22" y1="47" x2="28" y2="47" stroke="#555" stroke-width="0.5"/>
    <line x1="22" y1="51" x2="28" y2="51" stroke="#555" stroke-width="0.5"/>
    <line x1="40" y1="47" x2="46" y2="47" stroke="#555" stroke-width="0.5"/>
    <line x1="40" y1="51" x2="46" y2="51" stroke="#555" stroke-width="0.5"/>

    <!-- Track wheels -->
    <circle cx="22" cy="49" r="2" fill="#666" stroke="#555" stroke-width="0.5"/>
    <circle cx="28" cy="49" r="2" fill="#666" stroke="#555" stroke-width="0.5"/>
    <circle cx="40" cy="49" r="2" fill="#666" stroke="#555" stroke-width="0.5"/>
    <circle cx="46" cy="49" r="2" fill="#666" stroke="#555" stroke-width="0.5"/>

    <!-- === NECK JOINT === -->
    <rect x="30" y="16" width="8" height="4" rx="1.5" fill="#555" stroke="#444" stroke-width="0.5"/>
    <circle cx="34" cy="18" r="1.5" fill="#777"/>
  </g>

  <g id="owner_color">
    <!-- Stripe on body -->
    <rect x="34" y="26" width="8" height="6" fill="white"/>
  </g>

  <g id="level_color">
    <!-- Level ring on body -->
    <ellipse cx="34" cy="38" rx="8" ry="2" fill="none" stroke="white" stroke-width="1.5"/>
  </g>
</svg>
