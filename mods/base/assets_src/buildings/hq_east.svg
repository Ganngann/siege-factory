<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </linearGradient>
  </defs>

  <g id="base">
    <!-- Main body — fills 2×2 tiles -->
    <rect x="4" y="4" width="120" height="120" rx="4" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>
    <rect x="4" y="4" width="120" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- Central command dome (circle, center of complex) -->
    <circle cx="64" cy="64" r="30" fill="#4a4a4a" stroke="#3e3e3e" stroke-width="1"/>
    <circle cx="64" cy="64" r="22" fill="#444444" stroke="#555555" stroke-width="0.5"/>
    <circle cx="64" cy="64" r="10" fill="#3e3e3e"/>

    <!-- 4 corner modules -->
    <rect x="10" y="10" width="44" height="40" rx="2" fill="#4e4e4e" stroke="#3e3e3e" stroke-width="0.5"/>
    <rect x="74" y="10" width="44" height="40" rx="2" fill="#4e4e4e" stroke="#3e3e3e" stroke-width="0.5"/>
    <rect x="10" y="78" width="44" height="40" rx="2" fill="#4e4e4e" stroke="#3e3e3e" stroke-width="0.5"/>
    <rect x="74" y="78" width="44" height="40" rx="2" fill="#4e4e4e" stroke="#3e3e3e" stroke-width="0.5"/>

    <!-- Radar dish (top-left) — simple arc + line -->
    <path d="M 22 36 A 12 12 0 0 1 42 36" fill="none" stroke="#6a6a6a" stroke-width="1.5"/>
    <line x1="32" y1="36" x2="32" y2="20" stroke="#6a6a6a" stroke-width="1.5"/>

    <!-- Subtle tile dividers -->
    <line x1="64" y1="4" x2="64" y2="124" stroke="#3e3e3e" stroke-width="0.5" opacity="0.3"/>
    <line x1="4" y1="64" x2="124" y2="64" stroke="#3e3e3e" stroke-width="0.5" opacity="0.3"/>

    <!-- Corner bolts -->
    <circle cx="10" cy="10" r="2" fill="#6e6e6e"/>
    <circle cx="118" cy="10" r="2" fill="#6e6e6e"/>
    <circle cx="10" cy="118" r="2" fill="#6e6e6e"/>
    <circle cx="118" cy="118" r="2" fill="#6e6e6e"/>

    <!-- Yellow ports — 2 per side (one per tile) -->
    <!-- Right edge -->
    <rect x="124" y="24" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="124" y1="24" x2="124" y2="40" stroke="#ffe066" stroke-width="0.5"/>
    <rect x="124" y="88" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="124" y1="88" x2="124" y2="104" stroke="#ffe066" stroke-width="0.5"/>
    <!-- Left edge -->
    <rect x="0" y="24" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="4" y1="24" x2="4" y2="40" stroke="#ffe066" stroke-width="0.5"/>
    <rect x="0" y="88" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="4" y1="88" x2="4" y2="104" stroke="#ffe066" stroke-width="0.5"/>
  </g>

  <g id="owner_color">
    <!-- Thick stripe across right half -->
    <rect x="64" y="56" width="56" height="16" rx="1" fill="white"/>
  </g>

  <g id="level_color">
    <!-- Level badge top-right -->
    <rect x="100" y="6" width="22" height="8" rx="1" fill="white"/>
  </g>
</svg>
