<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </linearGradient>
  </defs>

  <g id="base">
    <!-- Main body — fills the tile -->
    <rect x="2" y="2" width="60" height="60" rx="3" fill="url(#bodyGrad)" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Body top highlight -->
    <rect x="2" y="2" width="60" height="2" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>

    <!-- Drill shaft hole — large circle, top-center -->
    <circle cx="32" cy="28" r="14" fill="#2e2e2e" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="32" cy="28" r="14" fill="none" stroke="#5a5a5a" stroke-width="0.5" stroke-dasharray="3,2"/>

    <!-- Depth shadow inside hole -->
    <circle cx="32" cy="28" r="8" fill="#1a1a1a"/>
    <circle cx="32" cy="27" r="4" fill="#111111"/>

    <!-- Processing unit below hole -->
    <rect x="12" y="44" width="40" height="12" rx="2" fill="#4e4e4e" stroke="#3e3e3e" stroke-width="1"/>

    <!-- Motor blocks on processing unit -->
    <rect x="16" y="46" width="8" height="8" rx="1" fill="#585858"/>
    <rect x="28" y="46" width="8" height="8" rx="1" fill="#585858"/>
    <rect x="40" y="46" width="8" height="8" rx="1" fill="#585858"/>

    <!-- Bolts at corners -->
    <circle cx="8" cy="8" r="1.5" fill="#6e6e6e"/>
    <circle cx="56" cy="8" r="1.5" fill="#6e6e6e"/>
    <circle cx="8" cy="56" r="1.5" fill="#6e6e6e"/>
    <circle cx="56" cy="56" r="1.5" fill="#6e6e6e"/>

    <!-- Yellow belt output port (right edge) -->
    <rect x="60" y="24" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="60" y1="24" x2="60" y2="40" stroke="#ffe066" stroke-width="0.5"/>

    <!-- Yellow belt input port (left edge) -->
    <rect x="0" y="24" width="4" height="16" rx="1" fill="#ffcc00" stroke="#cc9900" stroke-width="0.5"/>
    <line x1="4" y1="24" x2="4" y2="40" stroke="#ffe066" stroke-width="0.5"/>
  </g>

  <g id="owner_color">
    <!-- Stripe across processing unit -->
    <rect x="14" y="48" width="36" height="3" fill="white"/>
  </g>

  <g id="level_color">
    <!-- Level badge top-right -->
    <rect x="48" y="6" width="10" height="6" rx="1" fill="white"/>
  </g>
</svg>
