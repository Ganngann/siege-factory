title = "Capsule Genesis"
width = 520
height = 440

[[sections]]
type = "section"
title = "STATUT"
elements = [
    { type = "conditional_text", source_key = "capsule.current_tier", values = [
        { when = "0", text = "La capsule est silencieuse. Aucun signe de vie derrière la vitre noire." },
        { when = "1", text = "Un voyant clignote faiblement dans la pénombre. L'écran poussiéreux s'anime." },
        { when = "2", text = "L'écran s'illumine. Un bourdonnement parcourt la coque métallique." },
        { when = "3", text = "De la condensation apparaît sur la vitre. Une silhouette indistincte se dessine." },
        { when = "4", text = "Un battement régulier résonne. La silhouette contre la vitre se précise." },
        { when = "5", text = "Les pompes internes pulsent. Un fluide réparateur circule dans les artères de la capsule." },
        { when = "6", text = "Le réservoir de stase se remplit de liquide ambré. Les nanites soude nt les fissures." },
        { when = "7", text = "La main contre la vitre tremble. Les signes vitaux dansent sur l'écran." },
        { when = "8", text = "Compte à rebours final. La capsule s'illumine. Un premier souffle." },
    ] },
]

[[sections]]
type = "section"
title = "RÉPARATION"
elements = [
    { type = "tier_progress", current_key = "capsule.current_tier", max_key = "capsule.total_tiers" },
]

[[sections]]
type = "h_split"
left_width = 50
right_width = 50
left = [
    { type = "section", title = "DATA PAD", elements = [
        { type = "data_list", data_key = "capsule.logs" },
    ] },
]
right = [
    { type = "section", title = "TEXTE", elements = [
        { type = "data_text", data_key = "capsule.log_text" },
    ] },
]
