<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 64" width="128" height="64">
  <title>Assembler — Bâtiment de production (Phase 3). Machine d'assemblage automatisée avec tapis convoyeur, chambre en verre et bras robotique. Automatise le craft d'items. 128×64 px. Couleur : #4D99CC.</title>
  <desc>Assembleur — Bâtiment de production (Phase 3). Machine d'assemblage automatisée avec tapis convoyeur, chambre en verre et bras robotique. Automatise le craft d'items. 128×64 px. Couleur : #4D99CC.</desc>
  <!-- ⚠️ NE PAS MODIFIER — Corps du SVG inchangé ci-dessous -->
  <!-- shadow -->
  <ellipse cx="64" cy="56" rx="50" ry="6" fill="rgba(0,0,0,0.10)"/>
  <!-- assembler base -->
  <rect x="10" y="30" width="108" height="24" rx="4" fill="#4D99CC" stroke="#226688" stroke-width="0.8"/>
  <!-- conveyor belt -->
  <rect x="14" y="40" width="100" height="6" rx="2" fill="#333" stroke="#222" stroke-width="0.4"/>
  <line x1="16" y1="43" x2="112" y2="43" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <!-- assembly chamber -->
  <rect x="30" y="8" width="68" height="24" rx="4" fill="#66AACC" stroke="#226688" stroke-width="0.8"/>
  <!-- glass window -->
  <rect x="34" y="12" width="60" height="16" rx="2" fill="#111" opacity="0.3"/>
  <rect x="36" y="14" width="20" height="12" rx="1" fill="#88CCEE" opacity="0.15"/>
  <rect x="58" y="14" width="20" height="12" rx="1" fill="#88CCEE" opacity="0.15"/>
  <rect x="80" y="14" width="12" height="12" rx="1" fill="#88CCEE" opacity="0.15"/>
  <!-- robotic arm inside -->
  <line x1="46" y1="14" x2="50" y2="22" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="22" x2="56" y2="18" stroke="#555" stroke-width="2" stroke-linecap="round"/>
  <circle cx="56" cy="18" r="1.5" fill="#FF6633"/>
  <line x1="68" y1="14" x2="72" y2="20" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
  <!-- status lights -->
  <circle cx="36" cy="28" r="2" fill="#33FF33" opacity="0.7"/>
  <circle cx="44" cy="28" r="2" fill="#FFCC00" opacity="0.5"/>
  <!-- input hopper -->
  <path d="M14 30 L22 16 L38 16 L46 30Z" fill="#5599BB" stroke="#226688" stroke-width="0.5"/>
  <path d="M22 16 L24 12 L36 12 L38 16Z" fill="#66AACC" stroke="#226688" stroke-width="0.4"/>
  <!-- output slot -->
  <rect x="90" y="26" width="12" height="6" rx="2" fill="#226688" opacity="0.5"/>
  <!-- highlight -->
  <rect x="32" y="10" width="12" height="20" rx="2" fill="rgba(255,255,255,0.04)"/>
</svg>
