<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Gear Press — Bâtiment de production (Phase 2). Presse mécanique beige avec grand engrenage central, vérin et enclume. Usine les engrenages et vis. Couleur : #887766.</title>
  <desc>Presse à Engrenages — Bâtiment de production (Phase 2). Presse mécanique beige avec grand engrenage central, vérin et enclume. Usine les engrenages et vis. Couleur : #887766.</desc>
  <!-- ⚠️ NE PAS MODIFIER — Corps du SVG inchangé ci-dessous -->
  <!-- shadow -->
  <ellipse cx="32" cy="56" rx="20" ry="5" fill="rgba(0,0,0,0.10)"/>
  <!-- press frame -->
  <rect x="8" y="8" width="48" height="44" rx="4" fill="#887766" stroke="#554433" stroke-width="0.8"/>
  <!-- anvil base -->
  <rect x="12" y="38" width="40" height="10" rx="2" fill="#666655" stroke="#443322" stroke-width="0.6"/>
  <!-- pressing plate -->
  <rect x="18" y="30" width="28" height="8" rx="1" fill="#777766" stroke="#443322" stroke-width="0.5"/>
  <!-- ram shaft -->
  <rect x="30" y="18" width="4" height="14" rx="1" fill="#555544" stroke="#443322" stroke-width="0.4"/>
  <!-- large gear (the signature visual) -->
  <circle cx="32" cy="16" r="12" fill="#AA9955" stroke="#776644" stroke-width="1"/>
  <!-- gear teeth -->
  <rect x="19" y="14" width="4" height="4" rx="1" fill="#AA9955" stroke="#776644" stroke-width="0.3"/>
  <rect x="41" y="14" width="4" height="4" rx="1" fill="#AA9955" stroke="#776644" stroke-width="0.3"/>
  <rect x="30" y="3" width="4" height="4" rx="1" fill="#AA9955" stroke="#776644" stroke-width="0.3"/>
  <rect x="30" y="25" width="4" height="4" rx="1" fill="#AA9955" stroke="#776644" stroke-width="0.3"/>
  <!-- gear hub -->
  <circle cx="32" cy="16" r="4" fill="#665544" stroke="#443322" stroke-width="0.5"/>
  <circle cx="32" cy="16" r="2" fill="#443322"/>
  <!-- gear spokes -->
  <line x1="28" y1="16" x2="24" y2="16" stroke="#887755" stroke-width="1.5"/>
  <line x1="36" y1="16" x2="40" y2="16" stroke="#887755" stroke-width="1.5"/>
  <line x1="32" y1="12" x2="32" y2="8" stroke="#887755" stroke-width="1.5"/>
  <line x1="32" y1="20" x2="32" y2="24" stroke="#887755" stroke-width="1.5"/>
  <!-- highlight -->
  <rect x="10" y="10" width="10" height="36" rx="2" fill="rgba(255,255,255,0.03)"/>
</svg>
