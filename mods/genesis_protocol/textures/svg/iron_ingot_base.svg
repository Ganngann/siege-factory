<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Iron Ingot — Métal raffiné (Phase 1). Barre métallique grise avec face supérieure brillante et rainures. Base de tous les composants métalliques. Couleur : #AAAAAA.</title>
  <desc>Lingot de Fer — Métal raffiné (Phase 1). Barre métallique grise avec face supérieure brillante et rainures. Base de tous les composants métalliques. Couleur : #AAAAAA.</desc>
  <!-- ⚠️ NE PAS MODIFIER — Corps du SVG inchangé ci-dessous -->
  <!-- shadow -->
  <ellipse cx="32" cy="52" rx="20" ry="4" fill="rgba(0,0,0,0.10)"/>
  <!-- ingot body -->
  <path d="M10 24 L14 18 L50 18 L54 24 L50 44 L14 44Z" fill="#AAAAAA" stroke="#666" stroke-width="0.8"/>
  <!-- top face -->
  <path d="M14 18 L34 14 L50 18 L34 22Z" fill="#CCCCCC" stroke="#666" stroke-width="0.5"/>
  <!-- front face -->
  <rect x="14" y="22" width="36" height="22" fill="#999999" stroke="#666" stroke-width="0"/>
  <!-- bottom edge -->
  <path d="M14 44 L34 48 L50 44 L34 40Z" fill="#888888" stroke="#666" stroke-width="0.5"/>
  <!-- highlight on top -->
  <path d="M16 20 L32 17 L48 20" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- ingot notch -->
  <rect x="22" y="28" width="20" height="4" rx="1" fill="#888" opacity="0.4"/>
  <rect x="22" y="34" width="20" height="4" rx="1" fill="#888" opacity="0.4"/>
  <!-- shiny reflection -->
  <rect x="18" y="24" width="14" height="16" rx="3" fill="rgba(255,255,255,0.05)"/>
</svg>
