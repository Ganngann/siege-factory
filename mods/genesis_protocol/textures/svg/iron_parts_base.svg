<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Iron Parts — Composants métalliques (Phase 0). Assortiment de petites pièces : engrenage, boulon, rondelle, barre, clou. Fabriqué à partir de ferraille. Couleur : #999999.</title>
  <desc>Pièces de Fer — Composants métalliques (Phase 0). Assortiment de petites pièces : engrenage, boulon, rondelle, barre, clou. Fabriqué à partir de ferraille. Couleur : #999999.</desc>
  <!-- ⚠️ NE PAS MODIFIER — Corps du SVG inchangé ci-dessous -->
  <!-- shadow -->
  <ellipse cx="32" cy="54" rx="18" ry="5" fill="rgba(0,0,0,0.10)"/>
  <!-- gear part -->
  <circle cx="22" cy="22" r="10" fill="#999" stroke="#666" stroke-width="0.6"/>
  <circle cx="22" cy="22" r="4" fill="#777"/>
  <circle cx="22" cy="22" r="2" fill="#555"/>
  <rect x="11" y="20" width="4" height="4" rx="1" fill="#999" stroke="#666" stroke-width="0.3"/>
  <rect x="29" y="20" width="4" height="4" rx="1" fill="#999" stroke="#666" stroke-width="0.3"/>
  <rect x="20" y="11" width="4" height="4" rx="1" fill="#999" stroke="#666" stroke-width="0.3"/>
  <rect x="20" y="29" width="4" height="4" rx="1" fill="#999" stroke="#666" stroke-width="0.3"/>
  <!-- bolt -->
  <circle cx="18" cy="38" r="7" fill="#AAA" stroke="#666" stroke-width="0.5"/>
  <rect x="14" y="34" width="8" height="8" rx="1" fill="#888" stroke="#666" stroke-width="0.3"/>
  <circle cx="18" cy="38" r="2" fill="#666"/>
  <!-- washer -->
  <circle cx="40" cy="36" r="8" fill="#BBB" stroke="#888" stroke-width="0.5"/>
  <circle cx="40" cy="36" r="4" fill="#888"/>
