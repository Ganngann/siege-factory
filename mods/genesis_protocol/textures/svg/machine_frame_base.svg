<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Machine Frame — Structure porteuse (Phase 4). Cadre métallique en X avec renforts et rivets. Utilisé dans les bâtiments lourds. Couleur : #8888AA.</title>
  <desc>Châssis Mécanique — Structure porteuse (Phase 4). Cadre métallique en X avec renforts et rivets. Utilisé dans les bâtiments lourds. Couleur : #8888AA.</desc>
  <!-- ⚠️ NE PAS MODIFIER — Corps du SVG inchangé ci-dessous -->
  <!-- shadow -->
  <ellipse cx="32" cy="54" rx="20" ry="5" fill="rgba(0,0,0,0.10)"/>
  <!-- outer frame -->
  <rect x="8" y="6" width="48" height="46" rx="3" fill="none" stroke="#8888AA" stroke-width="4"/>
  <!-- inner opening -->
  <rect x="14" y="12" width="36" height="34" rx="2" fill="none" stroke="#555577" stroke-width="2"/>
  <!-- cross brace X -->
  <line x1="14" y1="12" x2="50" y2="46" stroke="#8888AA" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="12" x2="14" y2="46" stroke="#8888AA" stroke-width="2" stroke-linecap="round"/>
  <!-- vertical center strut -->
  <line x1="32" y1="12" x2="32" y2="46" stroke="#8888AA" stroke-width="1.5" stroke-linecap="round"/>
  <!-- horizontal center strut -->
  <line x1="14" y1="29" x2="50" y2="29" stroke="#8888AA" stroke-width="1.5" stroke-linecap="round"/>
  <!-- gusset plates at corners -->
  <polygon points="8,6 16,6 8,14" fill="#7777AA" stroke="#555577" stroke-width="0.5"/>
  <polygon points="56,6 48,6 56,14" fill="#7777AA" stroke="#555577" stroke-width="0.5"/>
  <polygon points="8,52 16,52 8,44" fill="#7777AA" stroke="#555577" stroke-width="0.5"/>
  <polygon points="56,52 48,52 56,44" fill="#7777AA" stroke="#555577" stroke-width="0.5"/>
  <!-- rivet dots -->
  <circle cx="10" cy="8" r="1.5" fill="#666688" stroke="#444466" stroke-width="0.3"/>
  <circle cx="54" cy="8" r="1.5" fill="#666688" stroke="#444466" stroke-width="0.3"/>
  <circle cx="10" cy="50" r="1.5" fill="#666688" stroke="#444466" stroke-width="0.3"/>
  <circle cx="54" cy="50" r="1.5" fill="#666688" stroke="#444466" stroke-width="0.3"/>
  <circle cx="32" cy="12" r="1" fill="#666688" stroke="#444466" stroke-width="0.3"/>
  <circle cx="32" cy="46" r="1" fill="#666688" stroke="#444466" stroke-width="0.3"/>
</svg>
