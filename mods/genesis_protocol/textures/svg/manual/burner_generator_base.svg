<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 64" width="128" height="64">
  <!-- shadow -->
  <ellipse cx="64" cy="56" rx="45" ry="6" fill="rgba(0,0,0,0.10)"/>
  <!-- generator body -->
  <rect x="14" y="16" width="100" height="36" rx="6" fill="#DD6622" stroke="#884411" stroke-width="0.8"/>
  <!-- front panel -->
  <rect x="14" y="16" width="46" height="36" rx="6" fill="#CC5511" stroke="#884411" stroke-width="0.6"/>
  <!-- gauge -->
  <circle cx="34" cy="28" r="8" fill="#222" stroke="#884411" stroke-width="0.5"/>
  <circle cx="34" cy="28" r="6" fill="#333"/>
  <!-- gauge needle -->
  <line x1="34" y1="28" x2="38" y2="24" stroke="#FF4400" stroke-width="1.5"/>
  <circle cx="34" cy="28" r="1.5" fill="#FF4400"/>
  <!-- vent slats on generator body -->
  <rect x="66" y="22" width="40" height="3" rx="1" fill="#AA4411" opacity="0.5"/>
  <rect x="66" y="28" width="40" height="3" rx="1" fill="#AA4411" opacity="0.5"/>
  <rect x="66" y="34" width="40" height="3" rx="1" fill="#AA4411" opacity="0.5"/>
  <!-- top exhaust -->
  <rect x="44" y="6" width="30" height="12" rx="3" fill="#CC5511" stroke="#884411" stroke-width="0.6"/>
  <!-- exhaust pipe -->
  <rect x="50" y="2" width="18" height="6" rx="2" fill="#884411" stroke="#663311" stroke-width="0.4"/>
  <!-- exhaust hole -->
  <rect x="52" y="3" width="14" height="3" rx="1" fill="#221100"/>
  <!-- warning stripe -->
  <rect x="14" y="44" width="100" height="3" fill="#FFDD00" opacity="0.6"/>
  <rect x="14" y="47" width="100" height="3" fill="#333" opacity="0.3"/>
  <!-- fuel input pipe -->
  <rect x="8" y="30" width="8" height="6" rx="2" fill="#884411" stroke="#663311" stroke-width="0.4"/>
  <!-- highlight -->
  <rect x="16" y="18" width="12" height="30" rx="2" fill="rgba(255,255,255,0.05)"/>
</svg>
