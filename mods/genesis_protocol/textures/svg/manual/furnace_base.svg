<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 64" width="128" height="64">
  <!-- shadow -->
  <ellipse cx="64" cy="56" rx="50" ry="6" fill="rgba(0,0,0,0.10)"/>
  <!-- furnace body -->
  <rect x="8" y="8" width="112" height="44" rx="4" fill="#884422" stroke="#553322" stroke-width="1"/>
  <!-- brick texture -->
  <rect x="8" y="8" width="112" height="3" rx="1" fill="#663322" opacity="0.4"/>
  <line x1="8" y1="22" x2="120" y2="22" stroke="#663322" stroke-width="0.5" opacity="0.3"/>
  <line x1="8" y1="36" x2="120" y2="36" stroke="#663322" stroke-width="0.5" opacity="0.3"/>
  <!-- firebox opening -->
  <rect x="32" y="20" width="64" height="28" rx="6" fill="#221111" stroke="#553322" stroke-width="1"/>
  <!-- inner glow -->
  <rect x="36" y="24" width="56" height="20" rx="4" fill="#FF4400" opacity="0.3"/>
  <rect x="40" y="26" width="48" height="16" rx="3" fill="#FF6600" opacity="0.4"/>
  <rect x="44" y="28" width="40" height="12" rx="2" fill="#FFAA00" opacity="0.3"/>
  <!-- fire inside -->
  <path d="M50 36 Q52 22 58 18 Q64 14 70 18 Q76 22 78 36Z" fill="#FF6622" opacity="0.5"/>
  <path d="M54 32 Q56 24 60 22 Q64 20 68 22 Q72 24 74 32Z" fill="#FFDD44" opacity="0.4"/>
  <!-- chimney/top rim -->
  <rect x="36" y="4" width="56" height="6" rx="2" fill="#994422" stroke="#553322" stroke-width="0.6"/>
  <!-- smoke -->
  <circle cx="48" cy="4" r="3" fill="rgba(200,200,200,0.08)"/>
  <circle cx="56" cy="2" r="4" fill="rgba(200,200,200,0.06)"/>
  <circle cx="64" cy="1" r="3" fill="rgba(200,200,200,0.05)"/>
  <!-- grate bars at bottom -->
  <line x1="36" y1="44" x2="92" y2="44" stroke="#553322" stroke-width="1.5" opacity="0.6"/>
  <line x1="36" y1="46" x2="92" y2="46" stroke="#553322" stroke-width="1" opacity="0.4"/>
  <!-- highlight on body -->
  <rect x="10" y="10" width="20" height="40" rx="2" fill="rgba(255,255,255,0.04)"/>
</svg>
