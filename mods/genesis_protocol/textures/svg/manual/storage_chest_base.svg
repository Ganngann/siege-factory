<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- shadow -->
  <ellipse cx="32" cy="56" rx="22" ry="5" fill="rgba(0,0,0,0.12)"/>
  <!-- chest body -->
  <rect x="6" y="12" width="52" height="36" rx="4" fill="#CC9900" stroke="#886611" stroke-width="1"/>
  <!-- chest lid -->
  <path d="M6 12 L32 6 L58 12 L32 16Z" fill="#DDAA22" stroke="#886611" stroke-width="0.8"/>
  <!-- metal banding -->
  <rect x="6" y="22" width="52" height="3" fill="#AA7711" opacity="0.5"/>
  <rect x="6" y="34" width="52" height="3" fill="#AA7711" opacity="0.5"/>
  <line x1="22" y1="12" x2="22" y2="48" stroke="#AA7711" stroke-width="2" opacity="0.4"/>
  <line x1="42" y1="12" x2="42" y2="48" stroke="#AA7711" stroke-width="2" opacity="0.4"/>
  <!-- lock -->
  <rect x="28" y="24" width="8" height="8" rx="1" fill="#DDBB44" stroke="#886611" stroke-width="0.6"/>
  <circle cx="32" cy="28" r="1.5" fill="#886611"/>
  <!-- keyhole -->
  <circle cx="32" cy="26" r="1" fill="#443300"/>
  <rect x="31" y="26" width="2" height="3" rx="0.5" fill="#443300"/>
  <!-- corner rivets -->
  <circle cx="12" cy="16" r="2" fill="#DDBB44" stroke="#886611" stroke-width="0.3"/>
  <circle cx="52" cy="16" r="2" fill="#DDBB44" stroke="#886611" stroke-width="0.3"/>
  <circle cx="12" cy="44" r="2" fill="#DDBB44" stroke="#886611" stroke-width="0.3"/>
  <circle cx="52" cy="44" r="2" fill="#DDBB44" stroke="#886611" stroke-width="0.3"/>
  <!-- wood grain -->
  <line x1="8" y1="26" x2="20" y2="26" stroke="#AA7711" stroke-width="0.3" opacity="0.3"/>
  <line x1="24" y1="26" x2="56" y2="26" stroke="#AA7711" stroke-width="0.3" opacity="0.3"/>
  <line x1="8" y1="38" x2="56" y2="38" stroke="#AA7711" stroke-width="0.3" opacity="0.3"/>
  <!-- highlight -->
  <rect x="8" y="14" width="14" height="34" rx="2" fill="rgba(255,255,255,0.05)"/>
</svg>
