<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- shadow -->
  <ellipse cx="32" cy="54" rx="22" ry="5" fill="rgba(0,0,0,0.10)"/>
  <!-- table top -->
  <rect x="4" y="26" width="56" height="8" rx="2" fill="#8B5E3C" stroke="#4A2F1E" stroke-width="0.8"/>
  <!-- table legs -->
  <rect x="8" y="34" width="4" height="20" rx="1" fill="#6B4230" stroke="#4A2F1E" stroke-width="0.5"/>
  <rect x="52" y="34" width="4" height="20" rx="1" fill="#6B4230" stroke="#4A2F1E" stroke-width="0.5"/>
  <!-- leg cross brace -->
  <rect x="10" y="40" width="44" height="3" rx="1" fill="#6B4230" stroke="#4A2F1E" stroke-width="0.3"/>
  <!-- wood grain on top -->
  <line x1="6" y1="28" x2="58" y2="28" stroke="#6B4230" stroke-width="0.3" opacity="0.4"/>
  <line x1="6" y1="30" x2="58" y2="30" stroke="#6B4230" stroke-width="0.3" opacity="0.4"/>
  <line x1="6" y1="32" x2="58" y2="32" stroke="#6B4230" stroke-width="0.3" opacity="0.4"/>
  <!-- hammer on table -->
  <rect x="14" y="20" width="22" height="5" rx="2" fill="#AA7733" stroke="#664422" stroke-width="0.5"/>
  <rect x="36" y="18" width="4" height="10" rx="1" fill="#887766" stroke="#555" stroke-width="0.3"/>
  <!-- metal parts on table -->
  <circle cx="44" cy="24" r="3" fill="#999" stroke="#666" stroke-width="0.3"/>
  <circle cx="44" cy="24" r="1" fill="#666"/>
  <rect x="16" y="16" width="6" height="4" rx="1" fill="#999" stroke="#666" stroke-width="0.3"/>
  <!-- table front panel -->
  <rect x="12" y="34" width="40" height="14" rx="1" fill="#7A5238" stroke="#4A2F1E" stroke-width="0.5"/>
  <!-- drawer -->
  <rect x="14" y="36" width="36" height="8" rx="1" fill="#8B5E3C" stroke="#4A2F1E" stroke-width="0.4"/>
  <circle cx="32" cy="40" r="1.5" fill="#AA7733" stroke="#664422" stroke-width="0.3"/>
</svg>
