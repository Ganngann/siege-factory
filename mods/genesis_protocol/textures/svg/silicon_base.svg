<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Silicon — Ressource raffinée (Phase 1). Plaquette ronde de silicium avec circuits intégrés. Produit dans le four à partir de sable. Couleur : #AACCDD.</title>
  <desc>Silicium — Ressource raffinée (Phase 1). Plaquette ronde de silicium avec circuits intégrés. Produit dans le four à partir de sable. Couleur : #AACCDD.</desc>
  <!-- ⚠️ NE PAS MODIFIER — Corps du SVG inchangé ci-dessous -->
  <!-- shadow -->
  <ellipse cx="32" cy="54" rx="18" ry="5" fill="rgba(0,0,0,0.10)"/>
  <!-- wafer circle -->
  <circle cx="32" cy="30" r="22" fill="#AACCDD" stroke="#667788" stroke-width="1"/>
  <!-- wafer inner ring -->
  <circle cx="32" cy="30" r="18" fill="none" stroke="#8899AA" stroke-width="0.5" opacity="0.5"/>
  <circle cx="32" cy="30" r="14" fill="none" stroke="#8899AA" stroke-width="0.3" opacity="0.4"/>
  <!-- die squares -->
  <rect x="20" y="18" width="6" height="6" rx="0.5" fill="#667788" opacity="0.4"/>
  <rect x="28" y="18" width="6" height="6" rx="0.5" fill="#667788" opacity="0.4"/>
  <rect x="36" y="18" width="6" height="6" rx="0.5" fill="#667788" opacity="0.4"/>
  <rect x="20" y="26" width="6" height="6" rx="0.5" fill="#667788" opacity="0.4"/>
  <rect x="28" y="26" width="6" height="6" rx="0.5" fill="#667788" opacity="0.4"/>
  <rect x="36" y="26" width="6" height="6" rx="0.5" fill="#667788" opacity="0.4"/>
  <rect x="20" y="34" width="6" height="6" rx="0.5" fill="#667788" opacity="0.4"/>
  <rect x="28" y="34" width="6" height="6" rx="0.5" fill="#667788" opacity="0.4"/>
  <rect x="36" y="34" width="6" height="6" rx="0.5" fill="#667788" opacity="0.4"/>
  <!-- circuit traces connecting dies -->
  <line x1="23" y1="24" x2="28" y2="24" stroke="#44AA88" stroke-width="0.5" opacity="0.6"/>
  <line x1="34" y1="24" x2="36" y2="24" stroke="#44AA88" stroke-width="0.5" opacity="0.6"/>
  <line x1="23" y1="30" x2="28" y2="30" stroke="#44AA88" stroke-width="0.5" opacity="0.6"/>
  <line x1="23" y1="36" x2="28" y2="36" stroke="#44AA88" stroke-width="0.5" opacity="0.6"/>
  <line x1="34" y1="30" x2="36" y2="30" stroke="#44AA88" stroke-width="0.5" opacity="0.6"/>
  <line x1="34" y1="36" x2="36" y2="36" stroke="#44AA88" stroke-width="0.5" opacity="0.6"/>
  <!-- wafer flat edge (notch) -->
  <path d="M48 42 L52 42 L54 44 L48 44Z" fill="#AACCDD" stroke="#667788" stroke-width="0.5"/>
  <!-- specular highlight -->
  <ellipse cx="28" cy="20" rx="6" ry="4" fill="rgba(255,255,255,0.08)"/>
</svg>
