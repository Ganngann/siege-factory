<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
                    <title>Wood</title>
                    <desc>Bois — Ressource naturelle Phase 0. Vue 3/4 : bûche (#8B5E3C) cylindrique avec cernes concentriques sur la tranche et écorce. Forme organique, aspect naturel brut par opposition aux métaux usinés. 64×64.</desc>
                    <defs>
                        <!-- Dégradé de l'écorce respectant la palette de bois -->
                        <linearGradient id="barkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#4a2f1e"></stop>
                            <stop offset="20%" stop-color="#7a4d2e"></stop>
                            <stop offset="50%" stop-color="#a4724b"></stop>
                            <stop offset="85%" stop-color="#8b5e3c"></stop>
                            <stop offset="100%" stop-color="#3e2312"></stop>
                        </linearGradient>
                        <!-- Dégradé du cœur du bois -->
                        <radialGradient id="ringGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#e3b787"></stop>
                            <stop offset="80%" stop-color="#d4a373"></stop>
                            <stop offset="100%" stop-color="#b88054"></stop>
                        </radialGradient>
                    </defs>

                    <!-- Ombre portée : semi-transparente, stricte 0.15, sans contour -->
                    <ellipse cx="32" cy="54" rx="20" ry="6" fill="rgba(0,0,0,0.15)"></ellipse>

                    <!-- Branche latérale (crée l'asymétrie naturelle requise) -->
                    <path d="M 47 32 L 55 29 A 2 4 0 0 1 57 34 L 46 40 Z" fill="url(#barkGrad)" stroke="#333333" stroke-width="1" stroke-linejoin="round"></path>
                    <ellipse cx="56" cy="31.5" rx="1.5" ry="3.5" transform="rotate(30 56 31.5)" fill="url(#ringGrad)" stroke="#333333" stroke-width="1"></ellipse>

                    <!-- Tronc principal -->
                    <path d="M 16 18 C 17 35 15 45 16 52 A 16 6 0 0 0 48 52 C 49 45 47 35 48 18 Z" fill="url(#barkGrad)" stroke="#333333" stroke-width="1" stroke-linejoin="round"></path>

                    <!-- Texture de l'écorce (lignes organiques internes, sans contour pur) -->
                    <path d="M 22 22 Q 24 35 21 52" fill="none" stroke="#2a1a10" stroke-width="1" opacity="0.6" stroke-linecap="round"></path>
                    <path d="M 28 20 Q 27 30 29 40 T 26 55" fill="none" stroke="#2a1a10" stroke-width="1" opacity="0.6" stroke-linecap="round"></path>
                    <path d="M 36 20 Q 38 35 35 55" fill="none" stroke="#2a1a10" stroke-width="1" opacity="0.6" stroke-linecap="round"></path>
                    <path d="M 42 22 Q 41 35 43 45" fill="none" stroke="#2a1a10" stroke-width="1" opacity="0.6" stroke-linecap="round"></path>

                    <!-- Mousse à la base (Aspect ruines/nature, palette #5A8C3C) -->
                    <path d="M 16 52 C 16 48 20 47 22 50 C 24 53 28 49 32 54 A 16 6 0 0 1 16 52 Z" fill="#5A8C3C" stroke="#333333" stroke-width="1" stroke-linejoin="round"></path>
                    <!-- Détails de la mousse -->
                    <circle cx="20" cy="51" r="1" fill="#66BB6A"></circle>
                    <circle cx="26" cy="52" r="0.5" fill="#66BB6A"></circle>

                    <!-- Coupe du haut (Surface de la tranche) -->
                    <ellipse cx="32" cy="18" rx="16" ry="6" fill="url(#ringGrad)" stroke="#333333" stroke-width="1"></ellipse>
                    
                    <!-- Cernes du bois -->
                    <ellipse cx="32" cy="18" rx="11" ry="4" fill="none" stroke="#a67146" stroke-width="1"></ellipse>
                    <ellipse cx="32" cy="18" rx="6" ry="2" fill="none" stroke="#a67146" stroke-width="1"></ellipse>
                    
                    <!-- Fissures sur la tranche pour l'aspect brut -->
                    <path d="M 32 18 L 39 21 M 32 18 L 26 16.5 M 32 18 L 34 15" fill="none" stroke="#8b5e3c" stroke-width="1" stroke-linecap="round"></path>

                    <!-- Reflet de lumière discret (sans contour) pour le volume -->
                    <path d="M 17.5 21 C 18.5 35 16.5 45 17.5 50" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-linecap="round"></path>
                </svg>